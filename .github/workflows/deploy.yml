name: Deploy to VPS

on:
  push:
    branches:
      - main # Jalankan otomatis pada saat push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # atau v10 sesuai yang Anda gunakan

      - name: 📦 Install Dependencies
        run: pnpm install

      - name: 🏗️ Build Next.js
        run: pnpm build
        env:
          DATABASE_URL: "mysql://dummy:dummy@127.0.0.1:3306/dummy"

      - name: 🗜️ Compress Build Files
        run: tar -czf deploy.tar.gz .next public src package.json pnpm-lock.yaml pnpm-workspace.yaml prisma next.config.ts tsconfig.json postcss.config.mjs prisma.config.ts

      - name: 📤 Upload Build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "deploy.tar.gz"
          target: "/var/www/juragan-transport"

      - name: 🚀 Deploy & Restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /var/www/juragan-transport
            
            # Ekstrak file build
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            # Install modul untuk production & generate prisma
            npm install -g pnpm
            pnpm install --prod
            
            # Migrate Database
            pnpm run db:migrate
            
            # Restart PM2 atau Start jika belum ada
            pm2 restart juragan-web || pm2 start "pnpm start" --name "juragan-web"
            pm2 save
